<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <title>Analisis Prestasi Farm</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Watering App">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #28a745;
            --warning: #ffc107;
            --danger: #d9534f;
            --dark: #343a40;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: var(--bg); color: #333; margin: 0; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-btn { text-decoration: none; color: white; background: var(--dark); padding: 10px 20px; border-radius: 8px; font-weight: bold; }

        .filter-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; align-items: flex-end; }
        .filter-item { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 13px; font-weight: bold; color: #666; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-top: 6px solid #ccc; }
        .stat-num { font-size: 36px; font-weight: bold; margin-top: 5px; }
        
        .breakdown-container { background: white; padding: 20px; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .breakdown-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 15px; }
        .breakdown-item { background: #fff5f5; padding: 10px; border-radius: 8px; border: 1px solid #ffe3e3; text-align: center; }

        .table-wrapper { background: white; border-radius: 15px; overflow-x: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; display: inline-block; }
        .bg-success { background: #d4edda; color: #155724; }
        .bg-warning { background: #fff3cd; color: #856404; }
        .bg-danger { background: #f8d7da; color: #721c24; }
        
        .btn-export { background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 Watering Performance Analytics</h1>
        <a href="form.html" class="nav-btn">🏠 Home</a>
    </div>

    <div class="filter-card">
        <div class="filter-grid">
            <div class="filter-item"><label>Mula:</label><input type="date" id="startDate" onchange="runFilter()"></div>
            <div class="filter-item"><label>Hingga:</label><input type="date" id="endDate" onchange="runFilter()"></div>
            <div class="filter-item">
                <label>Lokasi:</label>
                <select id="locSelect" onchange="syncPlots()">
                    <option value="ALL">Semua Lokasi</option>
                    <option value="BNN">BNN</option><option value="UNN1">UNN1</option><option value="UNN2">UNN2</option>
                </select>
            </div>
            <div class="filter-item">
                <label>Plot:</label>
                <select id="plotSelect" onchange="runFilter()"><option value="ALL">Semua Plot</option></select>
            </div>
            <button class="btn-export" onclick="downloadCSV()">📥 Export CSV</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card" style="border-top-color: var(--primary);">
            <div style="color:#888; font-size: 13px;">Berjaya (>50m)</div>
            <div id="statSuccess" class="stat-num" style="color: var(--primary);">0</div>
        </div>
        <div class="stat-card" style="border-top-color: var(--warning);">
            <div style="color:#888; font-size: 13px;">Separuh (<50m)</div>
            <div id="statPartial" class="stat-num" style="color: #b08a00;">0</div>
        </div>
        <div class="stat-card" style="border-top-color: var(--danger);">
            <div style="color:#888; font-size: 13px;">Total Isu</div>
            <div id="statTotalIssue" class="stat-num" style="color: var(--danger);">0</div>
        </div>
    </div>

    <div class="breakdown-container">
        <h3 style="margin:0; color: #d9534f; font-size: 16px;">🔍 Ringkasan Isu</h3>
        <div id="issueBreakdownArea" class="breakdown-grid"></div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Tarikh & Masa</th>
                    <th>Plot</th>
                    <th>Status</th>
                    <th>Durasi (m)</th>
                    <th>Pekerja</th>
                </tr>
            </thead>
            <tbody id="dataTable"></tbody>
        </table>
    </div>
</div>

<script>
    // Check if user is already logged in
    const currentUser = localStorage.getItem('loggedInUser');
    if (!currentUser) {
        window.location.href = "index.html"; 
    }
    
    const supabaseUrl = 'https://kmcjfqetnmnuoggofakz.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImttY2pmcWV0bm1udW9nZ29mYWt6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MDQzMTgsImV4cCI6MjA4OTE4MDMxOH0.p-t21iaY91hGzekxJos4ClKAwhbQ3uJcMCo-g-PrH14';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const plotData = {"BNN": ["B1", "B2", "B3", "B4"], "UNN1": ["U1", "U2", "U3", "U4", "U5"], "UNN2": ["N1", "N2", "N3"]};
    let fullData = [];

    function syncPlots() {
        const loc = document.getElementById('locSelect').value;
        const plotDropdown = document.getElementById('plotSelect');
        plotDropdown.innerHTML = '<option value="ALL">Semua Plot</option>';
        if (loc !== "ALL" && plotData[loc]) {
            plotData[loc].forEach(p => plotDropdown.add(new Option(p, p)));
        }
        runFilter();
    }

    async function loadData() {
        const { data, error } = await _supabase.from('watering_logs').select('*').order('start_time', { ascending: false });
        if (error) return console.error(error);
        fullData = data;
        runFilter();
    }

    function runFilter() {
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        const loc = document.getElementById('locSelect').value;
        const plot = document.getElementById('plotSelect').value;

        let filtered = fullData;
        if (start) filtered = filtered.filter(d => d.start_time >= start + 'T00:00:00');
        if (end) filtered = filtered.filter(d => d.start_time <= end + 'T23:59:59');
        if (loc !== "ALL") filtered = filtered.filter(d => d.plot_name.startsWith(loc) || plotData[loc].includes(d.plot_name));
        if (plot !== "ALL") filtered = filtered.filter(d => d.plot_name === plot);

        calculateStats(filtered);
    }

    function calculateStats(data) {
        let successCount = 0;
        let partialCount = 0;
        let totalIssueCount = 0;
        let issueTypes = {};

        const tbody = document.getElementById('dataTable');
        tbody.innerHTML = '';

        data.forEach(row => {
            const isIssue = row.issue_reason !== null;
            const isDeep = row.duration >= 50;
            const isPartial = !isIssue && row.duration < 50;

            let badgeClass = 'bg-success';
            let statusText = 'Berjaya';

            if (isIssue) {
                totalIssueCount++;
                issueTypes[row.issue_reason] = (issueTypes[row.issue_reason] || 0) + 1;
                badgeClass = 'bg-danger';
                statusText = '⚠️ ' + row.issue_reason;
            } else if (isPartial) {
                partialCount++;
                badgeClass = 'bg-warning';
                statusText = '🟡 Separuh';
            } else {
                successCount++;
            }

            // --- DATE & TIME FORMATTING (24h) ---
            const startDate = new Date(row.start_time);
            const formattedDate = startDate.toLocaleDateString('ms-MY'); // DD/MM/YYYY
            const formattedTime = startDate.toLocaleTimeString('ms-MY', { 
                hour12: false, 
                hour: '2-digit', 
                minute: '2-digit' 
            });

            tbody.innerHTML += `
                <tr>
                    <td>${formattedDate} <br> <small style="color:#666;">${formattedTime}</small></td>
                    <td><strong>${row.plot_name}</strong></td>
                    <td><span class="badge ${badgeClass}">${statusText}</span></td>
                    <td>${row.duration || 0}</td>
                    <td style="color:#999; font-size:11px;">${row.user_email}</td>
                </tr>`;
        });

        document.getElementById('statSuccess').innerText = successCount;
        document.getElementById('statPartial').innerText = partialCount;
        document.getElementById('statTotalIssue').innerText = totalIssueCount;

        const breakdownArea = document.getElementById('issueBreakdownArea');
        breakdownArea.innerHTML = totalIssueCount === 0 ? '<p style="color:#999; font-size:13px;">Tiada isu dikesan.</p>' : '';
        Object.keys(issueTypes).forEach(type => {
            breakdownArea.innerHTML += `<div class="breakdown-item"><div style="font-size:11px; color:#d9534f; font-weight:bold;">${type}</div><div style="font-size:18px; font-weight:bold;">${issueTypes[type]}</div></div>`;
        });
    }

    function downloadCSV() {
        let csv = "Tarikh,Masa,Plot,Status,Durasi,User\n";
        document.querySelectorAll("#dataTable tr").forEach(row => {
            const cells = Array.from(row.querySelectorAll("td"));
            const dateStr = cells[0].innerText.replace(/\n/g, ",").replace(/ /g, ""); // Splits Date and Time into 2 columns
            const rest = cells.slice(1).map(c => c.innerText.replace(/,/g, "")).join(",");
            csv += dateStr + "," + rest + "\n";
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = window.URL.createObjectURL(blob);
        a.download = `Farm_Analytics_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
    }

    window.onload = loadData;
</script>
</body>
</html>
