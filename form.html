<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <title>Watering Log</title>
    <link rel="apple-touch-icon" href="icon-512.png">
    <link rel="icon" type="image/png" href="icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Watering App">

    <style>
        body { font-family: sans-serif; background: #f0f7f4; padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 750px; margin: auto; }
        input[type="text"] { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; margin-top: 10px; }
        .start-btn { background-color: #2e7d32; }
        .stop-btn-small { background-color: #c62828; width: auto; padding: 10px 20px; }
        
        .active-session { background: #fff; border: 2px solid #2e7d32; padding: 15px; border-radius: 8px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .hidden-input { display: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: middle; }
        th { background-color: #f8f9fa; color: #2e7d32; }
        
        .thumb-container { display: flex; flex-direction: column; gap: 4px; }
        .thumb-item { display: flex; align-items: center; gap: 8px; }
        .thumbnail { width: 45px; height: 45px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; }
        .time-label { font-size: 11px; color: #666; font-weight: bold; }
        
        .total-row { background-color: #2e7d32; color: white; font-weight: bold; }
    </style>
</head>

<body>
<div id="offlineSyncStatus" style="position:fixed; top:0; left:0; width:100%; padding:8px; text-align:center; font-size:14px; z-index:10000; display:none; font-weight:bold;">
    <span id="statusText"></span>
</div>

<div class="card">
    <div class="selection-group" style="margin-bottom: 15px;padding: 15px; border: 1px solid #cccccc; border-radius: 8px; background: #f2fdf2;">
        <h1>🌿 Plot Watering Log</h1>
        <label>Location:</label>
        <select id="locationSelect" onchange="syncPlotOptions('locationSelect', 'plotSelect')" style="width: 100%; padding: 8px; margin-bottom: 10px;">
            <option value="">-- Select Location --</option>  
            <option value="BNN">BNN</option>
            <option value="UNN1">UNN1</option>
            <option value="UNN2">UNN2</option>
        </select>

        <label>Plot No:</label>
        <select id="plotSelect" style="width: 100%; padding: 8px; margin-bottom: 10px;">
            <option value="">-- Select Location First --</option>
        </select>
        <button class="start-btn" onclick="triggerStartCamera()">📸 Start</button>
    </div>

    <input type="file" id="cameraInput" accept="image/*" capture="camera" class="hidden-input">

    <div id="activeSessionsArea"></div>

    <div class="issue-report-box" style="margin-top: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; background: #fdf2f2;">
        <h2>❌ Tidak Dapat Siram</h2>
        <label>Location:</label>
        <select id="issueLocationSelect" onchange="syncPlotOptions('issueLocationSelect', 'issuePlotSelect')" style="width: 100%; padding: 8px; margin-bottom: 10px;">
            <option value="">-- Select Location --</option>  
            <option value="BNN">BNN</option>
            <option value="UNN1">UNN1</option>
            <option value="UNN2">UNN2</option>
        </select>
        <label>Plot No:</label>
        <select id="issuePlotSelect" style="width: 100%; padding: 8px; margin-bottom: 10px;">
            <option value="">-- Select Location First --</option>
        </select>
        <label>Reason:</label>
        <select id="reasonDropdown" style="width: 100%; padding: 8px; margin-bottom: 15px;">
            <option value="">-- Select Reason --</option>
            <option value="Hujan">🌧️ Hujan</option>
            <option value="Rosak">⚙️ Rosak</option>
            <option value="Spray">🐜 Spray</option>
            <option value="Banjir">🌊 Banjir</option>
            <option value="Kosong">🚫 Kosong</option>
            <option value="Lain-lain">❓ Lain-lain</option>
        </select>
        <button onclick="reportIssue()" style="width: 100%; background: #d9534f; color: white; padding: 10px; border: none; border-radius: 5px;">Lapor</button>
    </div>

    <hr>
    <h3>Completed Records</h3>
    <table>
        <thead>
            <tr>
                <th>User</th>
                <th>Plot</th>
                <th>Photos & Timestamps</th>
                <th>Duration</th>
            </tr>
        </thead>
        <tbody id="logBody"></tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="3">Total Watering Time:</td>
                <td id="grandTotal">0.00 min</td>
            </tr>
        </tfoot>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// 1. SECURITY CHECK
    const currentUser = localStorage.getItem('loggedInUser');
    if (!currentUser) {
        window.location.href = "index.html"; 
    }

    // 2. CONFIGURATION
    const supabaseUrl = 'https://kmcjfqetnmnuoggofakz.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImttY2pmcWV0bm1udW9nZ29mYWt6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MDQzMTgsImV4cCI6MjA4OTE4MDMxOH0.p-t21iaY91hGzekxJos4ClKAwhbQ3uJcMCo-g-PrH14';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let activeTimers = {};
    let currentPlotPending = "";
    const cameraInput = document.getElementById('cameraInput');
    const plotData = {
        "BNN": ["B1", "B2", "B3", "B4"],
        "UNN1": ["U1", "U2", "U3", "U4", "U5"],
        "UNN2": ["N1", "N2", "N3"]
    };

    // --- INITIALIZATION ---
    function updateSyncUI(count) {
        const bar = document.getElementById('offlineSyncStatus');
        const text = document.getElementById('statusText');
        if (!bar || !text) return;
        
        if (count > 0) {
            bar.style.display = 'block';
            bar.style.backgroundColor = '#fff3cd'; // Yellow
            bar.style.color = '#856404';
            text.innerHTML = `⏳ Offline Mode: ${count} record(s) waiting for signal...`;
        } else {
            bar.style.backgroundColor = '#d4edda'; // Green
            bar.style.color = '#155724';
            text.innerHTML = `✅ All records uploaded to Supabase!`;
            setTimeout(() => { bar.style.display = 'none'; }, 3000);
        }
    }

    window.onload = function() {
        const saved = localStorage.getItem('activeWateringSessions');
        if (saved) {
            activeTimers = JSON.parse(saved);
            renderActiveSessions();
        }
        syncOfflineData(); 
    };

    // --- DROPDOWN LOGIC ---
    function syncPlotOptions(locId, plotId) {
        const locValue = document.getElementById(locId).value;
        const plotDropdown = document.getElementById(plotId);
        plotDropdown.innerHTML = '<option value="">-- Select Plot --</option>';
        if (locValue && plotData[locValue]) {
            plotData[locValue].forEach(plot => {
                let option = document.createElement("option");
                option.value = plot;
                option.text = plot;
                plotDropdown.add(option);
            });
        }
    }

    // --- IMAGE COMPRESSION (Targeting ~500KB) ---
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    // If the image is huge, shrink it to 1024px width
                    // This is the biggest factor in file size
                    const MAX_WIDTH = 1024; 
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Quality 0.4 is the "Sweet Spot" for ~300KB - 500KB
                    // 0.4 means 40% quality, which is still very clear for plot photos
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.4); 
                    callback(dataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

    // --- WATERING ACTIONS ---
    function triggerStartCamera() {
        const plot = document.getElementById('plotSelect').value;
        if (!plot) return alert("Please select a Plot No!");
        if (activeTimers[plot]) return alert("Plot is already active!");
        currentPlotPending = plot;
        cameraInput.click();
    }

    cameraInput.onchange = function() {
        if (this.files && this.files.length > 0) {
            const plot = currentPlotPending;
            compressImage(this.files[0], (compressedBase64) => {
                activeTimers[plot] = { 
                    startTime: new Date().toISOString(),
                    startPhotoData: compressedBase64 
                };
                localStorage.setItem('activeWateringSessions', JSON.stringify(activeTimers));
                renderActiveSessions();
            });
            this.value = ''; 
        }
    };

    function triggerEndCamera(plot) {
        currentPlotPending = plot;
        const endCamera = document.createElement('input');
        endCamera.type = 'file';
        endCamera.accept = 'image/*';
        endCamera.capture = 'camera';
        endCamera.onchange = function() {
            if (this.files && this.files.length > 0) {
                compressImage(this.files[0], (compressedBase64) => {
                    finalizeStop(plot, compressedBase64);
                });
            }
        };
        endCamera.click();
    }

    async function finalizeStop(plot, compressedEndBase64) {
        const endTime = new Date();
        const session = activeTimers[plot];
        if (!session) return;

        const startDateObj = new Date(session.startTime);
        const durationMins = parseFloat(((endTime - startDateObj) / (1000 * 60)).toFixed(2));

        const pendingRecord = {
            user_email: currentUser,
            plot_name: plot,
            start_time: startDateObj.toISOString(),
            end_time: endTime.toISOString(),
            duration: durationMins,
            start_photo_data: session.startPhotoData,
            end_photo_data: compressedEndBase64,
            timestamp: Date.now()
        };

        let queue = JSON.parse(localStorage.getItem('pending_sync_queue') || "[]");
        queue.push(pendingRecord);
        localStorage.setItem('pending_sync_queue', JSON.stringify(queue));

        delete activeTimers[plot];
        localStorage.setItem('activeWateringSessions', JSON.stringify(activeTimers));
        renderActiveSessions();
        syncOfflineData(); 
    }

    // --- ISSUE REPORTING ---
    function reportIssue() {
        const plot = document.getElementById('issuePlotSelect').value;
        const reason = document.getElementById('reasonDropdown').value;
        if (!plot || !reason) return alert("Please select both a Plot and a Reason!");

        const now = new Date().toISOString();
        const issueRecord = {
            user_email: currentUser,
            plot_name: plot,
            start_time: now,
            end_time: now,
            duration: 0,
            issue_reason: reason,
            timestamp: Date.now() 
        };

        let queue = JSON.parse(localStorage.getItem('pending_sync_queue') || "[]");
        queue.push(issueRecord);
        localStorage.setItem('pending_sync_queue', JSON.stringify(queue));

        alert("Issue saved to phone memory!");
        syncOfflineData(); 
    }

    // --- SYNC ENGINE ---
    async function syncOfflineData() {
        let queue = JSON.parse(localStorage.getItem('pending_sync_queue') || "[]");
        if (queue.length === 0) {
            updateSyncUI(0);
            return;
        }

        updateSyncUI(queue.length);

        for (let i = 0; i < queue.length; i++) {
            const item = queue[i];
            try {
                let payload = {
                    user_email: item.user_email,
                    plot_name: item.plot_name,
                    start_time: item.start_time,
                    end_time: item.end_time,
                    duration: item.duration,
                    issue_reason: item.issue_reason || null
                };

                if (item.start_photo_data && item.end_photo_data) {
                    const ts = item.timestamp || Date.now();
                    const sPath = `${ts}_${item.plot_name}_S.jpg`;
                    const ePath = `${ts}_${item.plot_name}_E.jpg`;

                    const sBlob = await (await fetch(item.start_photo_data)).blob();
                    const eBlob = await (await fetch(item.end_photo_data)).blob();

                    await _supabase.storage.from('watering-photos').upload(sPath, sBlob, { contentType: 'image/jpeg', upsert: true });
                    await _supabase.storage.from('watering-photos').upload(ePath, eBlob, { contentType: 'image/jpeg', upsert: true });

                    payload.start_photo_url = _supabase.storage.from('watering-photos').getPublicUrl(sPath).data.publicUrl;
                    payload.end_photo_url = _supabase.storage.from('watering-photos').getPublicUrl(ePath).data.publicUrl;
                }

                const { error: dbErr } = await _supabase.from('watering_logs').insert([payload]);
                if (dbErr) throw dbErr;

                queue.splice(i, 1);
                localStorage.setItem('pending_sync_queue', JSON.stringify(queue));
                i--; 
                updateSyncUI(queue.length);
                
            } catch (err) {
                console.error("SYNC ERROR:", err.message);
                break; 
            }
        }
    }

    // --- UI RENDERING ---
    function renderActiveSessions() {
        const area = document.getElementById('activeSessionsArea');
        if (!area) return;
        area.innerHTML = '<h4>Plot Sedang Disiram:</h4>';
        const plots = Object.keys(activeTimers);
        if (plots.length === 0) {
            area.innerHTML += '<p style="color:gray">No active watering sessions.</p>';
            return;
        }
        plots.forEach(plot => {
            area.innerHTML += `
                <div class="active-session" style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid #ddd;">
                    <div><strong>${plot}</strong></div>
                    <button class="stop-btn-small" onclick="triggerEndCamera('${plot}')" style="background:#e91e63; color:white; border:none; padding:8px 12px; border-radius:5px;">📸 Selesai</button>
                </div>`;
        });
    }

    function logout() {
        const queue = JSON.parse(localStorage.getItem('pending_sync_queue') || "[]");
        if (queue.length > 0) {
            if (!confirm("You have " + queue.length + " records not uploaded. Logout anyway?")) return;
        }
        localStorage.removeItem('loggedInUser');
        window.location.href = "index.html";
    }

    window.addEventListener('online', syncOfflineData);
    setInterval(() => {
        let queue = JSON.parse(localStorage.getItem('pending_sync_queue') || "[]");
        if (queue.length > 0) syncOfflineData();
    }, 30000);

</script>

<div style="margin-top: 50px; padding: 20px; border-top: 1px solid #ddd; text-align: center;">
    <div style="display: flex; gap: 10px; justify-content: center;">
        <a href="records.html" style="text-decoration: none; background: #6c757d; color: white; padding: 12px 20px; border-radius: 8px; font-weight: bold;">📋 Rekod</a>
        <a href="dashboard.html" style="text-decoration: none; background: #007bff; color: white; padding: 12px 20px; border-radius: 8px; font-weight: bold;">📊 Dashboard</a>
    </div>
</div>

<div style="text-align: center; margin-top: 40px; padding-bottom: 20px;">
    <hr style="border: 0; border-top: 1px solid #eee; width: 80%; margin: 20px auto;">
    <button onclick="logout()" style="background: none; border: 1px solid #ccc; color: #070000; padding: 5px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;">
        Log Keluar
    </button>
</div>
</body>
</html>
